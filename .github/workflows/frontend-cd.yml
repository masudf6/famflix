name: Frontend CD

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "k8s/frontend-deployment.yaml"
      - "k8s/frontend-service.yaml"
      - "k8s/ingress-frontend.yaml"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: famflix-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        shell: bash
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"

          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $IMAGE_URI:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $IMAGE_URI:latest

          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

      - name: Export frontend image
        id: meta
        shell: bash
        run: |
          FRONTEND_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed frontend image: $FRONTEND_IMAGE"

  deploy:
    runs-on: [self-hosted, windows, x64, minikube-deploy]
    needs: build-and-push

    steps:
      - name: Refresh ECR pull secret
        shell: powershell
        run: |
          $password = aws ecr get-login-password --region $env:AWS_REGION
          kubectl delete secret ecr-secret -n famflix --ignore-not-found
          kubectl create secret docker-registry ecr-secret `
            --namespace famflix `
            --docker-server="$env:AWS_ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com" `
            --docker-username="AWS" `
            --docker-password="$password"

      - name: Debug frontend image
        shell: powershell
        run: |
          echo "Frontend image: ${{ needs.build-and-push.outputs.frontend_image }}"

      - name: Update frontend deployment image
        shell: powershell
        run: |
          $image = "$env:AWS_ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com/$env:ECR_REPOSITORY`:$env:IMAGE_TAG"
          echo "Frontend image: $image"
          kubectl set image deployment/frontend frontend="$image" -n famflix

      - name: Wait for frontend rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/frontend -n famflix
