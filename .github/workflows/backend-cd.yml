name: Backend CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "k8s/backend-deployment.yaml"
      - "k8s/backend-service.yaml"
      - ".github/workflows/backend-cd.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: famflix-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        shell: bash
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Export backend image
        id: meta
        shell: bash
        run: |
          echo "backend_image=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    runs-on: [self-hosted, windows, x64, minikube-deploy]
    needs: build-and-push

    steps:
      - name: Configure AWS credentials for deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Refresh ECR pull secret
        shell: powershell
        run: |
          $env:KUBECONFIG="C:\Users\Masud\.kube\config"
          $password = aws ecr get-login-password --region $env:AWS_REGION
          kubectl delete secret ecr-secret -n famflix --ignore-not-found
          kubectl create secret docker-registry ecr-secret `
            --namespace famflix `
            --docker-server="$env:AWS_ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com" `
            --docker-username="AWS" `
            --docker-password="$password"

      - name: Debug kube context
        shell: powershell
        run: |
          $env:KUBECONFIG="$env:USERPROFILE\.kube\config"
          kubectl config current-context
          kubectl cluster-info
          kubectl get nodes

      - name: Update backend deployment image
        shell: powershell
        run: |
          $env:KUBECONFIG="$env:USERPROFILE\.kube\config"
          $image = "$env:AWS_ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com/$env:ECR_REPOSITORY`:$env:IMAGE_TAG"
          echo "Backend image: $image"
          kubectl set image deployment/backend backend="$image" -n famflix

      - name: Wait for backend rollout
        shell: powershell
        run: |
          $env:KUBECONFIG="$env:USERPROFILE\.kube\config"
          kubectl rollout status deployment/backend -n famflix
