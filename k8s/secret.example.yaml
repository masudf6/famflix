apiVersion: v1
kind: Secret
metadata:
  name: famflix-secret
  namespace: famflix
type: Opaque
stringData:
  POSTGRES_PASSWORD: change_this_password

  DATABASE_URL: change_this_to_your_database_url
  JWT_SECRET_KEY: change_this_to_a_secure_key

  AWS_ACCESS_KEY_ID: change_this_to_your_aws_access_key_id
  AWS_SECRET_ACCESS_KEY: change_this_to_your_aws_secret_access_key
